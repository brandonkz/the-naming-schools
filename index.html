<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Naming Schools — AI Brand Name Generator</title>
  <meta name="description" content="Three naming philosophies compete to name your brand. Get 12 name ideas from the world's top naming frameworks for $1." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --text: #2a2a2a;
      --muted: #7a7568;
      --card: #ffffff;
      --border: #e0dcd4;
      --placek: #8B6914;
      --watkins: #2d6a4f;
      --manning: #6b2f8a;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sticky-header h1 {
      font-size: 24px;
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .sticky-header .subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
      padding: 20px 0;
    }

    .hero h2 {
      font-size: 42px;
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .hero p {
      color: var(--muted);
      font-size: 14px;
      max-width: 520px;
      margin: 0 auto 32px;
    }

    .school-pills {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .school-pill {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      border: 1.5px solid;
    }

    .school-pill.placek { border-color: var(--placek); color: var(--placek); }
    .school-pill.watkins { border-color: var(--watkins); color: var(--watkins); }
    .school-pill.manning { border-color: var(--manning); color: var(--manning); }

    .input-area {
      margin-bottom: 40px;
    }

    .input-area label {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      margin-bottom: 12px;
    }

    .input-area textarea {
      width: 100%;
      min-height: 140px;
      padding: 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      transition: border-color 0.2s;
    }

    .input-area textarea:focus {
      outline: none;
      border-color: var(--placek);
    }

    .input-area textarea::placeholder { color: #b5b0a5; }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .examples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .example-chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      background: var(--card);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-chip:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .generate-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 18px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .generate-btn:hover { opacity: 0.85; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .progress-step {
      flex: 1;
      padding: 14px 16px;
      border-radius: 10px;
      background: var(--card);
      border: 2px solid var(--border);
      text-align: center;
      font-size: 12px;
      transition: all 0.3s;
    }

    .progress-step .step-name {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .progress-step .step-status {
      font-size: 11px;
      color: var(--muted);
    }

    .progress-step.loading { border-color: var(--muted); }
    .progress-step.loading .step-status { color: var(--text); }
    .progress-step.done.placek { border-color: var(--placek); }
    .progress-step.done.watkins { border-color: var(--watkins); }
    .progress-step.done.manning { border-color: var(--manning); }
    .progress-step.done .step-status { color: #22c55e; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }

    .tab {
      padding: 12px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); }
    .tab.active[data-school="placek"] { border-bottom-color: var(--placek); color: var(--placek); }
    .tab.active[data-school="watkins"] { border-bottom-color: var(--watkins); color: var(--watkins); }
    .tab.active[data-school="manning"] { border-bottom-color: var(--manning); color: var(--manning); }

    .tab .check { display: inline-block; margin-left: 6px; font-size: 14px; }

    .name-card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .name-card.top-pick { border-top: 3px solid var(--border); }
    .name-card.top-pick[data-school="placek"] { border-top-color: var(--placek); }
    .name-card.top-pick[data-school="watkins"] { border-top-color: var(--watkins); }
    .name-card.top-pick[data-school="manning"] { border-top-color: var(--manning); }

    .name-card .name-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .name-card .top-badge {
      display: inline-block;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
      color: white;
    }

    .name-card .top-badge[data-school="placek"] { background: var(--placek); }
    .name-card .top-badge[data-school="watkins"] { background: var(--watkins); }
    .name-card .top-badge[data-school="manning"] { background: var(--manning); }

    .name-card .origin {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .name-card .effect { font-size: 13px; color: var(--text); }

    .verdict-box {
      background: var(--card);
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 24px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .verdict-box .verdict-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .verdict-box .verdict-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
    }

    .shortlist {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .shortlist h3 {
      font-size: 28px;
      font-style: italic;
      text-align: center;
      margin-bottom: 8px;
    }

    .shortlist .shortlist-sub {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .shortlist-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .shortlist-card {
      background: var(--card);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .shortlist-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .shortlist-card .school-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .shortlist-card[data-school="placek"] .school-label { color: var(--placek); }
    .shortlist-card[data-school="watkins"] .school-label { color: var(--watkins); }
    .shortlist-card[data-school="manning"] .school-label { color: var(--manning); }

    .shortlist-card .pick-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .shortlist-card .pick-effect { font-size: 12px; color: var(--muted); }

    .reset-btn {
      display: block;
      margin: 40px auto 0;
      padding: 12px 32px;
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: var(--text); color: var(--text); }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 40px 0;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
    }

    footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    footer a { color: var(--muted); }

    @media (max-width: 640px) {
      .shortlist-grid { grid-template-columns: 1fr; }
      .tabs { overflow-x: auto; }
      .tab { padding: 10px 14px; font-size: 12px; white-space: nowrap; }
      .hero h2 { font-size: 32px; }
      .progress-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const API_URL = 'https://fuddzrlnbrseofguuikp.supabase.co/functions/v1/generate';

    const SCHOOLS = {
      placek: { key: 'placek', name: 'Placek / Lexicon', tagline: 'Latin roots, hard sounds' },
      watkins: { key: 'watkins', name: 'Watkins / Eat My Words', tagline: 'Playful, human, SMILE' },
      manning: { key: 'manning', name: 'Manning / Igor', tagline: 'Provocative, counterintuitive' },
    };

    const EXAMPLES = [
      { label: '🧘 Meditation app', text: 'A meditation app for people who hate meditation. 60-second breathing exercises disguised as phone games.' },
      { label: '🐕 Dog food', text: 'Premium freeze-dried raw dog food delivered monthly. For dog owners who treat their pets like family.' },
      { label: '💰 Fintech', text: 'An app that rounds up every purchase to the nearest rand and invests the change in index funds.' },
      { label: '☕ Coffee', text: 'Single-origin South African coffee roasted in small batches. Subscription-based, direct from farm to cup.' },
    ];

    function App() {
      const [desc, setDesc] = useState('');
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState({});
      const [done, setDone] = useState({});
      const [activeTab, setActiveTab] = useState('placek');
      const [error, setError] = useState('');
      const [showResults, setShowResults] = useState(false);
      const resultsRef = useRef(null);

      const allDone = done.placek && done.watkins && done.manning;
      const hasErrors = Object.values(results).some(r => r && r.error);

      async function callSchool(schoolKey, description) {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ school: schoolKey, description }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
          throw new Error(err.error || `API error ${res.status}`);
        }

        return await res.json();
      }

      async function generate() {
        if (!desc.trim()) return;

        setLoading(true);
        setError('');
        setResults({});
        setDone({});
        setShowResults(true);
        setActiveTab('placek');

        // Scroll to results
        setTimeout(() => {
          if (resultsRef.current) {
            resultsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, 100);

        const schoolKeys = ['placek', 'watkins', 'manning'];
        const promises = schoolKeys.map(async (key) => {
          try {
            const result = await callSchool(key, desc);
            setResults(prev => ({ ...prev, [key]: result }));
            setDone(prev => {
              const next = { ...prev, [key]: true };
              // Auto-switch to first completed tab
              if (!prev.placek && !prev.watkins && !prev.manning) {
                setActiveTab(key);
              }
              return next;
            });
          } catch (e) {
            setResults(prev => ({ ...prev, [key]: { error: e.message } }));
            setDone(prev => ({ ...prev, [key]: true }));
          }
        });

        await Promise.all(promises);
        setLoading(false);
      }

      function reset() {
        setDesc('');
        setResults({});
        setDone({});
        setShowResults(false);
        setError('');
        setActiveTab('placek');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function useExample(text) {
        setDesc(text);
      }

      const schoolKeys = ['placek', 'watkins', 'manning'];

      return (
        <React.Fragment>
          <header className="sticky-header">
            <div>
              <h1>The Naming Schools</h1>
              <div className="subtitle">Three philosophies. One perfect name.</div>
            </div>
            {showResults && (
              <button className="reset-btn" onClick={reset} style={{ margin: 0, padding: '8px 16px' }}>
                ← New name
              </button>
            )}
          </header>

          <div className="container">
            {!showResults && (
              <React.Fragment>
                <div className="hero">
                  <h2>Name your next<br />big thing</h2>
                  <p>
                    Describe what you're building. Three world-class naming philosophies
                    will compete to find your perfect brand name.
                  </p>
                  <div className="school-pills">
                    <span className="school-pill placek">Lexicon — coined words</span>
                    <span className="school-pill watkins">Eat My Words — playful</span>
                    <span className="school-pill manning">Igor — provocative</span>
                  </div>
                </div>

                <div className="input-area">
                  <label>Describe your product, service, or idea</label>
                  <textarea
                    value={desc}
                    onChange={e => setDesc(e.target.value)}
                    placeholder="A meditation app for people who hate meditation. It uses 60-second breathing exercises disguised as phone games..."
                    maxLength={1000}
                  />
                  <div className="char-count">{desc.length} / 1000</div>

                  <div className="examples">
                    {EXAMPLES.map((ex, i) => (
                      <button key={i} className="example-chip" onClick={() => useExample(ex.text)}>
                        {ex.label}
                      </button>
                    ))}
                  </div>

                  {error && <div className="error-msg">{error}</div>}

                  <button
                    className="generate-btn"
                    onClick={generate}
                    disabled={loading || !desc.trim()}
                  >
                    Generate 12 names →
                  </button>
                </div>
              </React.Fragment>
            )}

            {showResults && (
              <div ref={resultsRef}>
                <div className="progress-bar">
                  {schoolKeys.map(key => (
                    <div key={key} className={`progress-step ${key} ${done[key] ? 'done' : loading ? 'loading' : ''}`}>
                      <div className="step-name">{SCHOOLS[key].name}</div>
                      <div className="step-status">
                        {done[key]
                          ? (results[key]?.error ? '✗ error' : '✓ done')
                          : '⏳ thinking...'}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="tabs">
                  {schoolKeys.map(key => (
                    <button
                      key={key}
                      className={`tab ${activeTab === key ? 'active' : ''}`}
                      data-school={key}
                      onClick={() => done[key] && setActiveTab(key)}
                      style={{ opacity: done[key] ? 1 : 0.4 }}
                    >
                      {SCHOOLS[key].name}
                      {done[key] && !results[key]?.error && <span className="check">✓</span>}
                    </button>
                  ))}
                </div>

                {schoolKeys.map(key => {
                  if (activeTab !== key) return null;
                  const r = results[key];

                  if (!done[key]) {
                    return (
                      <div key={key} className="loading-dots">
                        <span></span><span></span><span></span>
                      </div>
                    );
                  }

                  if (r && r.error) {
                    return <div key={key} className="error-msg">{r.error}</div>;
                  }

                  if (!r || !r.candidates) return null;

                  return (
                    <div key={key}>
                      {r.candidates.map((c, i) => {
                        const isTop = c.name === r.topPick;
                        return (
                          <div
                            key={i}
                            className={`name-card ${isTop ? 'top-pick' : ''}`}
                            data-school={key}
                            style={{ animationDelay: `${i * 0.12}s` }}
                          >
                            <div className="name-title">
                              {c.name}
                              {isTop && <span className="top-badge" data-school={key}>TOP PICK</span>}
                            </div>
                            <div className="origin">{c.origin}</div>
                            <div className="effect">{c.effect}</div>
                          </div>
                        );
                      })}
                      {r.verdict && (
                        <div className="verdict-box" style={{ animationDelay: '0.5s' }}>
                          <div className="verdict-label">Verdict</div>
                          <div className="verdict-text">"{r.verdict}"</div>
                        </div>
                      )}
                    </div>
                  );
                })}

                {allDone && !hasErrors && (
                  <div className="shortlist">
                    <h3>The Shortlist</h3>
                    <p className="shortlist-sub">Each school's top pick, side by side</p>
                    <div className="shortlist-grid">
                      {schoolKeys.map(key => {
                        const r = results[key];
                        if (!r || !r.topPick || !r.candidates) return null;
                        const topCandidate = r.candidates.find(c => c.name === r.topPick) || r.candidates[0];
                        return (
                          <div
                            key={key}
                            className="shortlist-card"
                            data-school={key}
                            onClick={() => setActiveTab(key)}
                          >
                            <div className="school-label">{SCHOOLS[key].name}</div>
                            <div className="pick-name">{r.topPick}</div>
                            <div className="pick-effect">{topCandidate.effect}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                <button className="reset-btn" onClick={reset}>← Start over with a new idea</button>
              </div>
            )}
          </div>

          <footer>
            The Naming Schools — Three philosophies, twelve names, one winner.
          </footer>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
